[build]
  command = "npm run build:web"
  publish = "apps/web/.next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web package.json package-lock.json netlify.toml"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[[plugins]]
  package = "@netlify/plugin-nextjs"
