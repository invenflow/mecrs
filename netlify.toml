[build]
  command = "npm ci --include=optional && npm run build:web"
  publish = "apps/web/.next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web package.json package-lock.json netlify.toml .npmrc"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"
  NPM_CONFIG_PRODUCTION = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
